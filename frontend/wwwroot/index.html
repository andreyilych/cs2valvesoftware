<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNS Checker — Проверка доменов</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>🔍 DNS Checker</h1>
            <p>Проверка доменных имён на подозрительность</p>
        </header>

        <main>
            <div class="checker-box">
                <div class="input-group">
                    <input type="text" id="domainInput" placeholder="Введите домен (например, google.com)"
                        autocomplete="off" autofocus>
                    <button id="checkBtn">Проверить</button>
                </div>

                <div id="examples">
                    <span>Примеры:</span>
                    <a href="#" class="example">google.com</a>
                    <a href="#" class="example">paypal.com</a>
                    <a href="#" class="example">iuqerfsodp1ifjaposdfjhgosurijfaewrwergwff.com</a>
                    <a href="#" class="example">netflix-account-verify.pw</a>
                </div>

                <div id="result" class="hidden">
                    <div id="resultHeader"></div>
                    <div id="resultDetails"></div>
                </div>

                <div id="error" class="hidden"></div>
                <div id="loading" class="hidden">Проверяем...</div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
