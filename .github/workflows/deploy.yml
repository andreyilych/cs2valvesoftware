name: Deploy DNS Checker

on:
  push:
    branches: [ master, main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Логин в GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }} # <- Используем новый секрет
      
      - name: Билд и пуш backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/dns-backend:latest
      
      - name: Билд и пуш frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/dns-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Деплой на сервер
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            docker pull ghcr.io/${{ github.repository_owner }}/dns-backend:latest
            docker pull ghcr.io/${{ github.repository_owner }}/dns-frontend:latest
            
            docker stop dns-backend dns-frontend 2>/dev/null || true
            docker rm dns-backend dns-frontend 2>/dev/null || true
            
            docker run -d --name dns-backend --restart always \
              -p 5000:5000 \
              ghcr.io/${{ github.repository_owner }}/dns-backend:latest
            
            docker run -d --name dns-frontend --restart always \
              -p 80:80 \
              ghcr.io/${{ github.repository_owner }}/dns-frontend:latest
            
            echo "✅ Деплой успешно завершён!"