name: Deploy DNS Checker

on:
  push:
    branches: [ master, main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout кода
        uses: actions/checkout@v4

      - name: Копируем модель и датасет
        run: |
          # Если модель уже обучена и лежит в репо
          if [ -f backend/dns_suspicion_model.zip ]; then
            echo "Модель найдена"
          else
            echo "ВНИМАНИЕ: модель не найдена. Будет обучена при старте."
          fi

      - name: Деплой через SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd /opt/dns-checker
            
            # Клонируем или пулим репозиторий
            if [ -d .git ]; then
              git pull origin main
            else
              git clone https://github.com/${{ github.repository }}.git .
            fi
            
            # Билдим и запускаем
            docker compose down
            docker compose build --no-cache
            docker compose up -d
            
            echo "✅ Деплой завершён!"
            
            # Ждём запуска
            sleep 5
            curl -s http://localhost:5000/api/dns/check?domain=google.com || echo "Бэкенд ещё запускается..."